"""
Lightspeed Commerce GraphQL Schema
Conceptual schema derived from Lightspeed Commerce REST APIs (Retail X-Series, Retail R-Series, eCom, Restaurant K-Series).
Covers product catalog, inventory, orders, customers, suppliers, purchase orders, payments, and multi-location analytics.
"""

schema {
  query: Query
  mutation: Mutation
}

# ─── Root Query ─────────────────────────────────────────────────────────────

type Query {
  # Products
  product(id: ID!): Product
  products(filter: ProductFilter, pagination: PaginationInput): ProductConnection

  # Variants
  variant(id: ID!): Variant
  variants(productId: ID!, pagination: PaginationInput): VariantConnection

  # Categories
  category(id: ID!): Category
  categories(pagination: PaginationInput): CategoryConnection

  # Inventory
  inventoryItem(id: ID!): InventoryItem
  inventoryItems(locationId: ID, filter: InventoryFilter, pagination: PaginationInput): InventoryItemConnection

  # Locations
  location(id: ID!): Location
  locations(pagination: PaginationInput): LocationConnection

  # Orders / Sales
  order(id: ID!): Order
  orders(filter: OrderFilter, pagination: PaginationInput): OrderConnection

  sale(id: ID!): Sale
  sales(filter: SaleFilter, pagination: PaginationInput): SaleConnection

  # Customers
  customer(id: ID!): Customer
  customers(filter: CustomerFilter, pagination: PaginationInput): CustomerConnection

  # Suppliers
  supplier(id: ID!): Supplier
  suppliers(pagination: PaginationInput): SupplierConnection

  # Purchase Orders
  purchaseOrder(id: ID!): PurchaseOrder
  purchaseOrders(filter: PurchaseOrderFilter, pagination: PaginationInput): PurchaseOrderConnection

  # Payments
  payment(id: ID!): Payment
  payments(filter: PaymentFilter, pagination: PaginationInput): PaymentConnection

  # Taxes
  taxRate(id: ID!): TaxRate
  taxRates: [TaxRate!]!

  # Discounts
  discount(id: ID!): Discount
  discounts(pagination: PaginationInput): DiscountConnection

  # Loyalty
  loyaltyAccount(customerId: ID!): LoyaltyAccount
  loyaltyTiers: [LoyaltyTier!]!

  # Employees / Staff
  employee(id: ID!): Employee
  employees(pagination: PaginationInput): EmployeeConnection

  # Registers
  register(id: ID!): Register
  registers(locationId: ID): [Register!]!

  # Webhooks
  webhook(id: ID!): Webhook
  webhooks: [Webhook!]!

  # Reports / Analytics
  salesReport(filter: ReportFilter!): SalesReport
  inventoryReport(locationId: ID, filter: ReportFilter!): InventoryReport

  # Shipments
  shipment(id: ID!): Shipment
  shipments(orderId: ID, pagination: PaginationInput): ShipmentConnection

  # Restaurant-specific
  menu(id: ID!): Menu
  menus(locationId: ID): [Menu!]!
  menuItem(id: ID!): MenuItem
  table(id: ID!): Table
  tables(locationId: ID): [Table!]!
  restaurantOrder(id: ID!): RestaurantOrder
  restaurantOrders(filter: RestaurantOrderFilter, pagination: PaginationInput): RestaurantOrderConnection
}

# ─── Root Mutation ───────────────────────────────────────────────────────────

type Mutation {
  # Products
  createProduct(input: CreateProductInput!): ProductPayload!
  updateProduct(id: ID!, input: UpdateProductInput!): ProductPayload!
  deleteProduct(id: ID!): DeletePayload!

  # Variants
  createVariant(productId: ID!, input: CreateVariantInput!): VariantPayload!
  updateVariant(id: ID!, input: UpdateVariantInput!): VariantPayload!
  deleteVariant(id: ID!): DeletePayload!

  # Inventory
  adjustInventory(input: InventoryAdjustmentInput!): InventoryAdjustmentPayload!
  transferInventory(input: InventoryTransferInput!): InventoryTransferPayload!

  # Orders
  createOrder(input: CreateOrderInput!): OrderPayload!
  updateOrder(id: ID!, input: UpdateOrderInput!): OrderPayload!
  cancelOrder(id: ID!, reason: String): OrderPayload!
  fulfillOrder(id: ID!, input: FulfillOrderInput!): OrderPayload!

  # Customers
  createCustomer(input: CreateCustomerInput!): CustomerPayload!
  updateCustomer(id: ID!, input: UpdateCustomerInput!): CustomerPayload!
  deleteCustomer(id: ID!): DeletePayload!

  # Suppliers
  createSupplier(input: CreateSupplierInput!): SupplierPayload!
  updateSupplier(id: ID!, input: UpdateSupplierInput!): SupplierPayload!

  # Purchase Orders
  createPurchaseOrder(input: CreatePurchaseOrderInput!): PurchaseOrderPayload!
  updatePurchaseOrder(id: ID!, input: UpdatePurchaseOrderInput!): PurchaseOrderPayload!
  receivePurchaseOrder(id: ID!, input: ReceivePurchaseOrderInput!): PurchaseOrderPayload!

  # Payments
  createPayment(input: CreatePaymentInput!): PaymentPayload!
  refundPayment(id: ID!, input: RefundInput!): PaymentPayload!

  # Loyalty
  addLoyaltyPoints(customerId: ID!, points: Int!, reason: String): LoyaltyAccount!
  redeemLoyaltyPoints(customerId: ID!, points: Int!, orderId: ID!): LoyaltyAccount!

  # Webhooks
  createWebhook(input: CreateWebhookInput!): WebhookPayload!
  updateWebhook(id: ID!, input: UpdateWebhookInput!): WebhookPayload!
  deleteWebhook(id: ID!): DeletePayload!

  # Restaurant
  createRestaurantOrder(input: CreateRestaurantOrderInput!): RestaurantOrderPayload!
  updateRestaurantOrder(id: ID!, input: UpdateRestaurantOrderInput!): RestaurantOrderPayload!
  updateTableStatus(id: ID!, status: TableStatus!): Table!
}

# ─── Pagination ──────────────────────────────────────────────────────────────

input PaginationInput {
  first: Int
  after: String
  last: Int
  before: String
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# ─── Product ─────────────────────────────────────────────────────────────────

type Product {
  id: ID!
  name: String!
  description: String
  sku: String
  barcode: String
  brand: String
  category: Category
  variants: [Variant!]!
  images: [ProductImage!]!
  tags: [String!]!
  supplier: Supplier
  isActive: Boolean!
  isTaxable: Boolean!
  taxRate: TaxRate
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ProductConnection {
  edges: [ProductEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type ProductEdge {
  node: Product!
  cursor: String!
}

type ProductImage {
  id: ID!
  url: String!
  altText: String
  position: Int!
}

input ProductFilter {
  name: String
  sku: String
  categoryId: ID
  isActive: Boolean
  supplierId: ID
  tags: [String!]
  createdAfter: DateTime
  createdBefore: DateTime
}

input CreateProductInput {
  name: String!
  description: String
  sku: String
  barcode: String
  brand: String
  categoryId: ID
  supplierId: ID
  tags: [String!]
  isActive: Boolean
  isTaxable: Boolean
  taxRateId: ID
}

input UpdateProductInput {
  name: String
  description: String
  sku: String
  barcode: String
  brand: String
  categoryId: ID
  supplierId: ID
  tags: [String!]
  isActive: Boolean
  isTaxable: Boolean
  taxRateId: ID
}

type ProductPayload {
  product: Product
  userErrors: [UserError!]!
}

